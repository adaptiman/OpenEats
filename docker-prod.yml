services:
  api:
    image: adaptiman/openeats-api
    command: /startup/prod-entrypoint.sh
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:443/api/v1/recipe/recipes/?limit=1', timeout=8)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    volumes:
      - static-files:/code/static-files
      - site-media:/code/site-media
    depends_on:
      db:
        condition: service_healthy
    env_file:
      env_prod.list
  web:
    image: adaptiman/openeats-web
    command: yarn start
    depends_on:
      - api
    volumes:
      - public-ui:/code/build
    env_file:
      env_prod.list
  db:
    image: mariadb@sha256:b3af559fc38e013c50dd5b5993bfbbb21125c1a62d976b3b0a14d9c4acaae578
    command:
      - --character-set-server=latin1
      - --collation-server=latin1_swedish_ci
      - --sql-mode=
    volumes:
      - database-current:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 20
    env_file:
      env_prod.list
  nginx:
    image: adaptiman/openeats-nginx
    command: ./start.sh
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - static-files:/var/www/html/openeats-static/static-files
      - site-media:/var/www/html/openeats-static/site-media
      - public-ui:/var/www/html/openeats-static/public-ui
    depends_on:
      - api
      - web
    env_file:
      env_prod.list
volumes:
  database:
  database-current:
    name: openeats_database_current
  public-ui:
  static-files:
  site-media:
